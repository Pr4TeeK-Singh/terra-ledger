<div class="grid-card">

  <div class="grid-header">
    <div class="grid-title-group">
      <h2 class="grid-title">Land Records</h2>
      <span class="grid-count">{{ lands.length }} records</span>
    </div>
    <div class="grid-actions">
      <button class="grid-btn" (click)="clearFilters()">Clear filters</button>
      <button class="grid-btn" (click)="exportCsv()">Export CSV</button>
      <button class="grid-btn danger"
              [disabled]="!selectedLand"
              (click)="deleteSelected()">
        Delete selected
      </button>
    </div>
  </div>

  <ag-grid-angular
    [theme]="theme"
    [rowData]="lands"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [pagination]="pagination"
    [paginationPageSize]="paginationPageSize"
    [paginationPageSizeSelector]="paginationPageSizeSelector"
    rowSelection="single"
    [suppressRowClickSelection]="false"
    (gridReady)="onGridReady($event)"
    (rowSelected)="onRowSelected($event)"
    (cellValueChanged)="onCellValueChanged($event)"
    style="width: 100%; height: 480px;">
  </ag-grid-angular>

</div>

<!-- Plot panel shown below when a land row is selected -->
<div *ngIf="selectedLand" class="plot-section">
  <app-plot-panel [land]="selectedLand"></app-plot-panel>
</div>
