<div class="plot-card">

  <div class="plot-header">
    <div class="plot-title-group">
      <h3 class="plot-title">Plots — {{ land.gaataNumber }}</h3>
      <span class="plot-count">{{ plots.length }} plots</span>
    </div>
    <div class="plot-actions">
      <button class="grid-btn" (click)="clearFilters()">Clear filters</button>
      <button class="grid-btn" (click)="exportCsv()">Export CSV</button>
      <button class="grid-btn accent" (click)="showAddForm = !showAddForm">
        {{ showAddForm ? 'Cancel' : '+ Add plot' }}
      </button>
    </div>
  </div>

  <div *ngIf="showAddForm" class="add-plot-form">
    <app-plot-form [land]="land" (plotSaved)="onPlotSaved()"></app-plot-form>
  </div>

  <ag-grid-angular
    [theme]="theme"
    [rowData]="plots"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
    [pagination]="true"
    [paginationPageSize]="10"
    rowSelection="single"
    (gridReady)="onGridReady($event)"
    (rowSelected)="onRowSelected($event)"
    (cellValueChanged)="onCellValueChanged($event)"
    style="width: 100%; height: 360px;">
  </ag-grid-angular>

</div>
